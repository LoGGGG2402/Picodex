name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump version and tag
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version, commit, and tag
        id: bump
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --tags
          git checkout -B release-work "origin/${GITHUB_REF_NAME}"
          head_subject="$(git log -1 --pretty=%s HEAD)"
          if printf '%s' "${head_subject}" | grep -Fq '[skip ci]'; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="$(npm version patch -m "chore(release): v%s [skip ci]")"
          release_version="${release_tag#v}"
          release_commit_sha="$(git rev-parse HEAD)"

          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "commit_sha=${release_commit_sha}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin "${release_tag}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${release_commit_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build release
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          lfs: true

      - name: Ensure LFS assets are materialized
        run: |
          git lfs install --local
          git lfs pull

      - name: Validate app.asar payload
        run: |
          if grep -q '^version https://git-lfs.github.com/spec/v1' app.asar; then
            echo "app.asar is still a Git LFS pointer. Ensure checkout downloads LFS objects."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build single-file launcher
        run: npm run build:single

      - name: Prepare release asset
        run: |
          mkdir -p release
          mv dist/cli.js "release/cli.js"
          chmod +x "release/cli.js"
          node -e "const fs=require('node:fs'); const crypto=require('node:crypto'); const file=process.argv[1]; const digest=crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex'); fs.writeFileSync(file + '.sha256', digest + '  ' + file.split('/').pop() + '\n');" "release/cli.js"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release
          path: release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          path: release
          name: release

      - name: Show release payload
        run: ls -lh release

      - name: Resolve release metadata
        id: meta
        run: |
          echo "tag=${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "name=${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.commit_sha }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release/*
